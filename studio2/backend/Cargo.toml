version = "0.1.0"
edition = "2021"
description = "Studio2 backend (protocol + gateway + virtual fs)"
license = "MIT OR Apache-2.0"

[dependencies]
makepad-network = { path = "../../libs/network", version = "1.0.0" }
makepad-script = { path = "../../platform/script", version = "1.0.0" }
makepad-micro-serde = { path = "../../libs/micro_serde", version = "1.0.0" }
