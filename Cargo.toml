#debug = true

[patch.crates-io]
arrayvec = { path = "libs/vulkan/arrayvec" }
ash = { path = "libs/vulkan/ash" }
bit-set = { path = "libs/vulkan/bit-set" }
bit-vec = { path = "libs/vulkan/bit-vec" }
bitflags = { path = "libs/bitflags" }
cfg-if = { path = "libs/cfg-if" }
cfg_aliases = { path = "libs/vulkan/cfg_aliases" }
equivalent = { path = "libs/vulkan/equivalent" }
foldhash = { path = "libs/vulkan/foldhash" }
hashbrown = { path = "libs/vulkan/hashbrown" }
hexf-parse = { path = "libs/vulkan/hexf-parse" }
indexmap = { path = "libs/vulkan/indexmap" }
libloading = { path = "libs/vulkan/libloading" }
log = { path = "libs/vulkan/log" }
naga = { path = "libs/vulkan/naga" }
num-traits = { path = "libs/vulkan/num-traits" }
once_cell = { path = "libs/vulkan/once_cell" }
downcast-rs = { path = "libs/linux/downcast-rs" }
scoped-tls = { path = "libs/linux/scoped-tls" }
pkg-config = { path = "libs/linux/pkg-config" }
smallvec = { path = "libs/smallvec" }
rustc-hash = { path = "libs/vulkan/rustc-hash" }
spirv = { path = "libs/vulkan/spirv" }
thiserror = { path = "libs/vulkan/thiserror" }
thiserror-impl = { path = "libs/vulkan/thiserror-impl" }
windows-link = { path = "libs/windows/windows-link" }
crunchy = { path = "libs/vulkan/crunchy" }
zerocopy = { path = "libs/vulkan/zerocopy" }

[profile.small]
inherits = "release"
#debug = true
opt-level = 'z'   # Optimize for size
lto = true        # Enable link-time optimization
codegen-units = 1 # Reduce number of codegen units to increase optimizations
panic = 'abort'   # Abort on panic
strip = true

[profile.release.package.makepad-voice]
codegen-units = 1


