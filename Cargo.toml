workspace.members = [
    # === examples ===
    "examples/teamtalk",
    "examples/map",
    "examples/arracing",
    "examples/splash",
    "examples/charts",
    "examples/scratchpad",
    "examples/todo",
    "examples/vector",
    "examples/comfyui",
    "examples/aichat",
    "examples/pdf",
#    "examples/matrix",
    "libs/latex_math",
    "libs/mbtile_reader",
    "libs/pdf_parse",
    "libs/regex",
    "libs/svg",
    "platform/script/test",
    "widgets/test",
    "studio",
    "studio/ai",
    "tools/cargo_makepad",
    "tools/remote",
    "libs/terminal_core",
#    "libs/matrix",
]

workspace.exclude = [
    "libs/stitch",
    "libs/wasm_bridge/test",
    "tools/windows_strip",
    "tools/web_server",
    "tools/file_router",
    "tools/wasm_strip",
]

workspace.resolver = "2"
#debug = true

[profile.small]
inherits = "release"
#debug = true
opt-level = 'z'   # Optimize for size
lto = true        # Enable link-time optimization
codegen-units = 1 # Reduce number of codegen units to increase optimizations
panic = 'abort'   # Abort on panic
strip = true


