workspace.members = [
    # === examples ===
    "examples/teamtalk",
    "examples/map",
    "examples/arracing",
    "examples/splash",
    "examples/charts",
    "examples/scratchpad",
    "examples/todo",
    "examples/vector",
    "examples/comfyui",
    "examples/aichat",
    "examples/pdf",
#    "examples/matrix",
    "libs/latex_math",
    "libs/mbtile_reader",
    "libs/pdf_parse",
    "libs/regex",
    "libs/svg",
    "platform/script/test",
    "widgets/test",
    "studio",
    "studio/ai",
    "tools/cargo_makepad",
    "tools/remote",
    "libs/terminal_core",
#    "libs/matrix",
]

workspace.exclude = [
    "libs/stitch",
    "libs/wasm_bridge/test",
    # vendored third-party libs (tests require external dev-deps)
    "libs/ab_glyph_rasterizer",
    "libs/adler2",
    "libs/bitflags",
    "libs/bytemuck",
    "libs/byteorder",
    "libs/cfg-if",
    "libs/crc32fast",
    "libs/flate2",
    "libs/fxhash",
    "libs/jpeg-encoder",
    "libs/memchr",
    "libs/miniz_oxide",
    "libs/pulldown-cmark",
    "libs/rustybuzz",
    "libs/sdfer",
    "libs/simd-adler32",
    "libs/smallvec",
    "libs/ttf-parser",
    "libs/unicase",
    "libs/unicode-bidi",
    "libs/unicode-bidi-mirroring",
    "libs/unicode-ccc",
    "libs/unicode-linebreak",
    "libs/unicode-properties",
    "libs/unicode-script",
    "libs/unicode-segmentation",
    # vendored zune libs (doctests reference original crate names)
    "libs/zune-core",
    "libs/zune-inflate",
    "libs/zune-jpeg",
    "libs/zune-png",
    # platform-specific libs
    "libs/windows/windows-collections",
    "libs/windows/windows-core",
    "libs/windows/windows-future",
    "libs/windows/windows-link",
    "libs/windows/windows-result",
    "libs/windows/windows-rs",
    "libs/windows/windows-strings",
    "libs/linux/wayland-backend",
    "libs/linux/wayland-client",
    "libs/linux/wayland-egl",
    "libs/linux/wayland-protocols",
    "libs/linux/wayland-sys",
    "tools/windows_strip",
    "tools/web_server",
    "tools/file_router",
    "tools/wasm_strip",
]

workspace.resolver = "2"
#debug = true

[profile.small]
inherits = "release"
#debug = true
opt-level = 'z'   # Optimize for size
lto = true        # Enable link-time optimization
codegen-units = 1 # Reduce number of codegen units to increase optimizations
panic = 'abort'   # Abort on panic
strip = true


