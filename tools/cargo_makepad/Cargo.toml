[package]
name = "cargo-makepad"
version = "1.0.0"
authors = ["Makepad <info@makepad.nl>"]
edition = "2021"
description = "Makepad cargo extension"
license = "MIT OR Apache-2.0"
homepage = "https://github.com/makepad/makepad/"
repository = "https://github.com/makepad/makepad/"
metadata.makepad-auto-version = "3q9p7hJP7S16AZ2sa6ONkcZPa0w="
metadata.makepad-check-platform = "desktop"

[dependencies]
makepad-zip-file = { path = "../../libs/zip_file", version = "1.0.0" }
makepad-toml-parser = { path = "../../libs/toml_parser", version = "1.0.0" }
makepad-shell = { path = "../../libs/shell", version = "1.0.0" }
makepad-network = { path = "../../platform/network", version = "1.0.0" }
makepad-micro-serde = { path = "../../libs/micro_serde", version = "1.0.0" }
makepad-wasm-strip = { path = "../../libs/wasm_strip", version = "1.0.0" }
makepad-live-reload-core = { path = "../../libs/live_reload_core", version = "0.1.0" }
makepad-studio-protocol = { path = "../../platform/studio", version = "0.1.0" }
brotli = "8.0"

[features]
nightly = []
